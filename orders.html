<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>My Orders</title>

<link rel="stylesheet"
href="style_v2.css">

</head>

<body>

<header class="navbar">

    <h2 style="color:white;">
        My Orders
    </h2>

    <a
    href="index_v2.html"
    class="nav-link">

        ← Continue Shopping

    </a>

</header>

<div
class="orders-container"
id="ordersContainer">

</div>

<script>

function loadOrders(){

    let orders =
    JSON.parse(
        localStorage.getItem(
            "orders"
        )
    ) || [];

    const container =
    document.getElementById(
        "ordersContainer"
    );

    container.innerHTML = "";

    if(orders.length === 0){

        container.innerHTML =

        `
        <h2 style="
        text-align:center;
        margin-top:50px;">
        No Orders Found
        </h2>
        `;

        return;
    }

    orders
    .slice()
    .reverse()
    .forEach(order=>{

        let total = 0;

        let productsHTML = "";

        if(
            order.items &&
            order.items.length > 0
        ){

            order.items.forEach(item=>{

                let price = 0;

                if(item.price){

                    price =
                    parseInt(
                        item.price.replace(
                            /[^\d]/g,
                            ""
                        )
                    ) || 0;

                }

                let quantity =
                item.quantity || 1;

                total +=
                price * quantity;

                productsHTML +=

                `
                <div class="order-item">

                    <img
                    src="${item.image}"
                    alt="${item.name}">

                    <div>

                        <h4>
                            ${item.name}
                        </h4>

                        <p>
                            ${item.price || "₹0"}
                        </p>

                        <p>
                            Qty :
                            ${quantity}
                        </p>

                    </div>

                </div>
                `;

            });

        }

        container.innerHTML +=

        `
        <div class="order-box">

            <h3>
                Order ID :
                ${order.id || "N/A"}
            </h3>

            <p>
                Date :
                ${order.date || "N/A"}
            </p>

            <p>
                Status :
                🟡 ${order.status || "Pending"}
            </p>

            <div class="order-status">

                <span>
                    📦 Ordered
                </span>

                ➜

                <span>
                    🚚 Shipped
                </span>

                ➜

                <span>
                    🏠 Delivered
                </span>

            </div>

            <hr>

            <h4>
                Customer Details
            </h4>

            <p>
                ${order.customerName || ""}
            </p>

            <p>
                ${order.phone || ""}
            </p>

            <p>
                ${order.address || ""}
            </p>

            <hr>

            ${productsHTML}

            <hr>

            <h3>
                Grand Total :
                ₹${total}
            </h3>

        </div>
        `;

    });

}

loadOrders();

</script>

</body>

</html>
