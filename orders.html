<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f1f3f6;
padding:20px;
}

.header{
background:#2874f0;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header a{
color:white;
text-decoration:none;
font-weight:bold;
}

.orders-container{
max-width:1000px;
margin:auto;
}

.order-item{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:8px;
display:flex;
align-items:center;
gap:20px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.order-item img{
width:120px;
height:120px;
object-fit:contain;
}

.product-info h3{
margin-bottom:10px;
}

.empty{
background:white;
padding:40px;
text-align:center;
font-size:20px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="header">

<h2>📦 My Orders</h2>

<a href="index.html">
⬅ Back to Home
</a>

</div>

<div class="orders-container">

<div id="ordersList"></div>

</div>

<script>

const orders =
JSON.parse(
localStorage.getItem("orders")
) || [];

const ordersList =
document.getElementById(
"ordersList"
);

if(
orders.length===0
){

ordersList.innerHTML=
`
<div class="empty">
No Orders Found
</div>
`;

}
else{

orders.forEach(item=>{

const div=
document.createElement("div");

div.className=
"order-item";

div.innerHTML=
`
<img src="${item.image}">

<div class="product-info">

<h3>${item.name}</h3>

<p>${item.offer}</p>

<p>
✅ Delivered Successfully
</p>

</div>
`;

ordersList.appendChild(div);

});

}

</script>

</body>
</html>
