<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f1f3f6;
padding:20px;
}

.header{
background:#2874f0;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header a{
color:white;
text-decoration:none;
font-weight:bold;
}

.profile-card{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.profile-card h2{
margin-bottom:20px;
}

.info{
margin-bottom:15px;
font-size:18px;
}

.info span{
font-weight:bold;
}

.logout-btn{
background:red;
color:white;
border:none;
padding:12px 20px;
cursor:pointer;
border-radius:5px;
margin-top:20px;
}

.stats{
margin-top:20px;
padding-top:20px;
border-top:1px solid #ddd;
}

</style>

</head>

<body>

<div class="header">

<h2>👤 My Profile</h2>

<a href="index.html">
⬅ Back to Home
</a>

</div>

<div class="profile-card">

<h2>User Details</h2>

<div class="info">
Name:
<span id="name">
Not Registered
</span>
</div>

<div class="info">
Email:
<span id="email">
Not Registered
</span>
</div>

<div class="stats">

<div class="info">
🛒 Cart Items:
<span id="cartCount">
0
</span>
</div>

<div class="info">
❤️ Wishlist Items:
<span id="wishlistCount">
0
</span>
</div>

<div class="info">
📦 Orders:
<span id="orderCount">
0
</span>
</div>

</div>

<button
class="logout-btn"
id="logoutBtn">

Logout

</button>

</div>

<script>

// USER

// USER

const user =
JSON.parse(
localStorage.getItem(
"user"
)
);

if(user){

document.getElementById(
"name"
).textContent =
user.name;

document.getElementById(
"email"
).textContent =
user.email;

}

// CART

const cartItems =
JSON.parse(
localStorage.getItem(
"cartItems"
)
) || [];

document.getElementById(
"cartCount"
).textContent =
cartItems.length;

// WISHLIST

const wishlistItems =
JSON.parse(
localStorage.getItem(
"wishlistItems"
)
) || [];

document.getElementById(
"wishlistCount"
).textContent =
wishlistItems.length;

// ORDERS

const orders =
JSON.parse(
localStorage.getItem(
"orders"
)
) || [];

document.getElementById(
"orderCount"
).textContent =
orders.length;

// LOGOUT

document
.getElementById(
"logoutBtn"
)
.addEventListener(
"click",
()=>{

localStorage.removeItem(
"user"
);

alert(
"Logged Out Successfully"
);

window.location.href =
"index.html";

}
);

</script>

</body>
</html>
