<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>My Profile</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<header class="navbar">

    <h2 style="color:white;">
        My Profile
    </h2>

    <a href="index.html"
       class="nav-link">

        ← Home

    </a>

</header>

<div class="profile-container">

    <div class="profile-card">

        <img
        src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
        alt="Profile"
        class="profile-image">

        <h2 id="profileName">
            Guest User
        </h2>

        <p id="profileEmail">
            Not Registered
        </p>

        <hr style="margin:20px 0;">

        <div class="profile-stats">

            <div>
                <h3 id="cartTotal">0</h3>
                <p>Cart Items</p>
            </div>

            <div>
                <h3 id="wishlistTotal">0</h3>
                <p>Wishlist</p>
            </div>

            <div>
                <h3 id="ordersTotal">0</h3>
                <p>Orders</p>
            </div>

        </div>

        <button id="logoutBtn">
            Logout
        </button>

    </div>

</div>

<script>

const user =
JSON.parse(
localStorage.getItem("user")
);

if(user){

    document.getElementById(
    "profileName"
    ).textContent = user.name;

    document.getElementById(
    "profileEmail"
    ).textContent = user.email;
}

const cartItems =
JSON.parse(
localStorage.getItem(
"cartItems"
)
) || [];

const wishlistItems =
JSON.parse(
localStorage.getItem(
"wishlistItems"
)
) || [];

const orders =
JSON.parse(
localStorage.getItem(
"orders"
)
) || [];

document.getElementById(
"cartTotal"
).textContent =
cartItems.length;

document.getElementById(
"wishlistTotal"
).textContent =
wishlistItems.length;

document.getElementById(
"ordersTotal"
).textContent =
orders.length;

document.getElementById(
"logoutBtn"
).onclick = ()=>{

    localStorage.removeItem(
    "user"
    );

    alert(
    "Logged Out Successfully"
    );

    window.location.href =
    "index_v2.html";
};

</script>

</body>
</html>
