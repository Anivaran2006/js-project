<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Wishlist
</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<header class="navbar">

    <h2 style="color:white;">
        My Wishlist
    </h2>

    <a
    href="index.html"
    class="nav-link">

        ← Continue Shopping

    </a>

</header>

<div
id="wishlistContainer"
class="cart-container">

</div>

<script>

function loadWishlist(){

    let wishlistItems =
    JSON.parse(
        localStorage.getItem(
            "wishlistItems"
        )
    ) || [];

    const container =
    document.getElementById(
        "wishlistContainer"
    );

    container.innerHTML = "";

    wishlistItems.forEach(
        (item,index)=>{

            container.innerHTML +=

            `
            <div class="cart-item">

                <img
                src="${item.image}">

                <div>

                    <h3>
                        ${item.name}
                    </h3>

                    <p>
                        ${item.price}
                    </p>

                    <button
                    onclick="moveToCart(${index})">

                        Move To Cart

                    </button>

                    <button
                    onclick="removeWishlist(${index})">

                        Remove

                    </button>

                </div>

            </div>
            `;

        }
    );

}

function moveToCart(index){

    let wishlistItems =
    JSON.parse(
        localStorage.getItem(
            "wishlistItems"
        )
    ) || [];

    let cartItems =
    JSON.parse(
        localStorage.getItem(
            "cartItems"
        )
    ) || [];

    const item =
    wishlistItems[index];

    item.quantity = 1;

    cartItems.push(item);

    wishlistItems.splice(
        index,
        1
    );

    localStorage.setItem(
        "cartItems",
        JSON.stringify(
            cartItems
        )
    );

    localStorage.setItem(
        "wishlistItems",
        JSON.stringify(
            wishlistItems
        )
    );

    loadWishlist();

}

function removeWishlist(index){

    let wishlistItems =
    JSON.parse(
        localStorage.getItem(
            "wishlistItems"
        )
    ) || [];

    wishlistItems.splice(
        index,
        1
    );

    localStorage.setItem(
        "wishlistItems",
        JSON.stringify(
            wishlistItems
        )
    );

    loadWishlist();

}

loadWishlist();

</script>

</body>
</html>
