<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Cart</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f1f3f6;
padding:20px;
}

.header{
background:#2874f0;
color:white;
padding:15px;
margin-bottom:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.header a{
color:white;
text-decoration:none;
font-weight:bold;
}

.cart-container{
max-width:1000px;
margin:auto;
}

.cart-item{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:8px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.product-info h3{
margin-bottom:5px;
}

.remove-btn{
background:red;
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
border-radius:4px;
}

.total{
background:white;
padding:15px;
border-radius:8px;
margin-top:20px;
font-size:20px;
font-weight:bold;
}

.empty{
text-align:center;
font-size:20px;
padding:40px;
}
</style>
</head>

<body>

<div class="header">
<h2>🛒 Shopping Cart</h2>

<a href="index.html">
⬅ Back to Home
</a>
</div>

<div class="cart-container">

<div id="cartItems"></div>

<div class="total">
Total Items:
<span id="totalItems">0</span>
</div>

</div>

<script>

let cartItems =
JSON.parse(
localStorage.getItem(
"cartItems"
)
) || [];

const cartContainer =
document.getElementById(
"cartItems"
);

const totalItems =
document.getElementById(
"totalItems"
);

function renderCart(){

cartContainer.innerHTML="";

if(cartItems.length===0){

cartContainer.innerHTML=
`
<div class="empty">
Your Cart is Empty
</div>
`;

totalItems.textContent=0;

return;
}

cartItems.forEach(
(item,index)=>{

const div=
document.createElement(
"div"
);

div.className=
"cart-item";

div.innerHTML=
`
<div class="product-info">
<h3>${item.name}</h3>
<p>${item.offer}</p>
</div>

<button
class="remove-btn"
onclick="removeItem(${index})">
Remove
</button>
`;

cartContainer.appendChild(
div
);

}
);

totalItems.textContent=
cartItems.length;

}

function removeItem(index){

cartItems.splice(
index,
1
);

localStorage.setItem(
"cartItems",
JSON.stringify(cartItems)
);

renderCart();

}

renderCart();

</script>

</body>
</html>
