<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Cart
</title>

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<header class="navbar">

    <h2 style="color:white;">
        My Cart
    </h2>

    <a
    href="index.html"
    class="nav-link">

        ← Continue Shopping

    </a>

</header>

<div
class="cart-container"
id="cartContainer">

</div>

<div
class="checkout-box">

    <h2>

        Grand Total :
        ₹<span id="grandTotal">
            0
        </span>

    </h2>

    <input
    type="text"
    id="customerName"
    placeholder="Full Name">

    <input
    type="text"
    id="phone"
    placeholder="Phone Number">

    <textarea
    id="address"
    placeholder="Delivery Address">
    </textarea>

    <button
    id="placeOrderBtn">

        Place Order

    </button>

</div>

<script>

function loadCart(){

    let cartItems =
    JSON.parse(
        localStorage.getItem(
            "cartItems"
        )
    ) || [];

    const container =
    document.getElementById(
        "cartContainer"
    );

    let grandTotal = 0;

    container.innerHTML = "";
     if(cartItems.length === 0){

    container.innerHTML = `
    <h2 style="
    text-align:center;
    margin-top:50px;">
    Cart Is Empty
    </h2>
    `;

    document.querySelector(
    ".checkout-box"
    ).style.display = "none";

    return;
}
    cartItems.forEach(
        (item,index)=>{

           let price = 0;

if(item.price){

    price =
    parseInt(
        item.price.replace(
            /[^\d]/g,
            ""
        )
    ) || 0;

}

            grandTotal +=
            price *
            item.quantity;

            container.innerHTML +=

            `
            <div class="cart-item">

                <img
                src="${item.image}">

                <div>

                    <h3>
                        ${item.name}
                    </h3>

                    <p>
                        ${item.price}
                    </p>

                    <div>

                        <button
                        onclick="decrease(${index})">

                            -

                        </button>

                        ${item.quantity}

                        <button
                        onclick="increase(${index})">

                            +

                        </button>

                    </div>

                    <button
                    onclick="removeItem(${index})">

                        Remove

                    </button>

                </div>

            </div>
            `;

        }
    );

    document
    .getElementById(
        "grandTotal"
    )
    .textContent =
    grandTotal;

}

function increase(index){

    let cartItems =
    JSON.parse(
        localStorage.getItem(
            "cartItems"
        )
    );

    cartItems[index]
    .quantity++;

    localStorage.setItem(
        "cartItems",
        JSON.stringify(
            cartItems
        )
    );

    loadCart();

}

function decrease(index){

    let cartItems =
    JSON.parse(
        localStorage.getItem(
            "cartItems"
        )
    );

    if(
        cartItems[index]
        .quantity > 1
    ){

        cartItems[index]
        .quantity--;

    }

    localStorage.setItem(
        "cartItems",
        JSON.stringify(
            cartItems
        )
    );

    loadCart();

}

function removeItem(index){

    let cartItems =
    JSON.parse(
        localStorage.getItem(
            "cartItems"
        )
    );

    cartItems.splice(
        index,
        1
    );

    localStorage.setItem(
        "cartItems",
        JSON.stringify(
            cartItems
        )
    );

    loadCart();

}

document
.getElementById(
    "placeOrderBtn"
)
.onclick = ()=>{

    let orders =
    JSON.parse(
        localStorage.getItem(
            "orders"
        )
    ) || [];

    let cartItems =
    JSON.parse(
        localStorage.getItem(
            "cartItems"
        )
    ) || [];

    const order = {

        id:
        Date.now(),

        date:
        new Date()
        .toLocaleString(),

        customerName:
        document
        .getElementById(
            "customerName"
        )
        .value,

        phone:
        document
        .getElementById(
            "phone"
        )
        .value,

        address:
        document
        .getElementById(
            "address"
        )
        .value,

        status:
        "Order Received",

        items:
        cartItems

    };

    orders.push(
        order
    );

    localStorage.setItem(
        "orders",
        JSON.stringify(
            orders
        )
    );

    localStorage.removeItem(
        "cartItems"
    );

    alert(
        "Order Placed Successfully"
    );

    window.location.href =
    "orders.html";

};

loadCart();

</script>

</body>
</html>
